
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenCRM · Система управления</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Geologica:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #141a10;
  --forest: #1e3d18;
  --moss: #3a6b2e;
  --fern: #5a9448;
  --sage: #8cbf76;
  --dew: #d4ead0;
  --mist: #eef7ec;
  --parchment: #f6f3ea;
  --cream: #fffdf5;
  --gold: #b8882a;
  --gold-light: #e8c96a;
  --rust: #8b3a2a;
  --shadow: rgba(20,40,16,.12);
  --shadow-deep: rgba(20,40,16,.22);
  --border: #dde8d9;
}

html[data-theme="dark"] {
  --ink: #e9f6e6;
  --forest: #0f2311;
  --moss: #1c3a18;
  --fern: #7ccf6a;
  --sage: #9fe089;
  --dew: #132916;
  --mist: #0c180d;
  --parchment: #0b120b;
  --cream: #070e07;
  --gold: #e0b84a;
  --gold-light: #f0d37a;
  --rust: #ff7a64;
  --shadow: rgba(0,0,0,.35);
  --shadow-deep: rgba(0,0,0,.55);
  --border: #203a22;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Geologica', sans-serif;
  font-weight: 300;
  background: var(--cream);
  color: var(--ink);
  overflow-x: hidden;
  min-height: 100vh;
}

#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--forest);
  position: fixed;
  inset: 0;
  z-index: 999;
}

#app { display: none; }

header {
  background: var(--forest);
  height: 58px;
  display: flex;
  align-items: center;
  padding: 0 32px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  margin-right: auto;
  text-decoration: none;
}
.logo em { font-style: italic; color: var(--sage); }

nav { display: flex; }

nav button {
  background: none;
  border: none;
  color: rgba(255,255,255,.45);
  font-family: 'Geologica', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 10px 18px;
  cursor: pointer;
  transition: color .2s;
}
nav button.active { color: var(--sage); }

.page { display: none; padding: 40px; animation: fadeUp .3s ease; }
.page.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.page-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  font-weight: 700;
  color: var(--forest);
  margin-bottom: 28px;
}
.page-title em { font-style: italic; color: var(--fern); }

.card {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.table-toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  align-items: center;
}

.search-input {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 12px;
  padding: 9px 14px;
  width: 240px;
}

.btn {
  background: var(--forest);
  border: none;
  border-radius: 4px;
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 9px 20px;
  cursor: pointer;
}
.btn.ml { margin-left: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th {
  text-align: left;
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--fern);
  padding: 12px 16px;
  border-bottom: 1px solid var(--dew);
}
td {
  padding: 13px 16px;
  border-bottom: 1px solid var(--mist);
  color: #777;
}

.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--forest);
  border-radius: 8px;
  padding: 14px 22px;
  font-size: 12px;
  color: rgba(255,255,255,.85);
  z-index: 300;
  transform: translateY(80px);
  opacity: 0;
  transition: all .35s ease;
}
.toast.show {
  transform: translateY(0);
  opacity: 1;
}

.icon-btn {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--cream);
  color: var(--fern);
  cursor: pointer;
  font-family: 'Geologica', sans-serif;
  font-size: 14px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  margin-left: 16px;
}
.icon-btn:hover { background: var(--mist); border-color: var(--dew); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="logo">Green<em>CRM</em></div>
  </div>
</div>

<div id="app">
<header>
  <div class="logo">Green<em>CRM</em></div>
  <nav id="main-nav">
    <button class="active" onclick="showPage('deals', this)">Сделки</button>
    <button onclick="showPage('expenses', this)">Расходы</button>
    <button onclick="showPage('equipment', this)">Техника</button>
    <button onclick="showPage('services', this)">Прайс-лист</button>
    <button onclick="showPage('stock',this)"><span>Склад</span></button>
    <button onclick="showPage('contacts',this)"><span>Контакты</span></button>
  </nav>
  <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="Тёмная тема">🌙</button>
</header>

<div class="page active" id="page-deals">
  <div class="page-title">Сделки</div>
  <div class="card">
    <table><thead><tr><th>ID</th><th>Клиент</th><th>Название</th><th>Сумма</th><th>Стадия</th><th>Дата</th></tr></thead><tbody id="deals-tbody"></tbody></table>
  </div>
</div>

<div class="page" id="page-expenses">
  <div class="page-title">Расходы</div>
  <div class="card">
    <table><thead><tr><th>ID</th><th>Название</th><th>Категория</th><th>Сумма</th><th>Дата</th></tr></thead><tbody id="expenses-tbody"></tbody></table>
  </div>
</div>

<div class="page" id="page-equipment">
  <div class="page-title">Техника</div>
  <div class="card">
    <table><thead><tr><th>ID</th><th>Название</th><th>Модель</th><th>Статус</th></tr></thead><tbody id="equipment-tbody"></tbody></table>
  </div>
</div>

<div class="page" id="page-services">
  <div class="page-title">Прайс-лист</div>
  <div class="card">
    <table><thead><tr><th>ID</th><th>Название</th><th>Категория</th><th>Цена</th><th>Ед. изм.</th></tr></thead><tbody id="services-tbody"></tbody></table>
  </div>
</div>

<div class="page" id="page-stock">
  <div class="page-title">Склад</div>
  <div class="card">
    <table><thead><tr><th>Наименование</th><th>Остаток</th><th>Себест./ед.</th><th>Сумма на складе</th><th>Примечание</th></tr></thead><tbody id="consumables-tbody"></tbody></table>
  </div>
</div>

<div class="page" id="page-contacts">
  <div class="page-title">Контакты</div>
  <div class="card">
    <table><thead><tr><th>Имя</th><th>Телефон</th><th>E-mail</th><th></th></tr></thead><tbody id="contacts-tbody"></tbody></table>
  </div>
</div>


</div>
<div class="toast" id="toast"></div>

<script>
const API_BASE = '/api';

async function api(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    const token = sessionStorage.getItem('token');
    if (token) headers['Authorization'] = `Bearer ${token}`;

    try {
        const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        if (response.status === 401) {
            sessionStorage.removeItem('token');
            window.location.href = `${API_BASE}/auth/login`;
            throw new Error('Unauthorized');
        }
        if (!response.ok) {
            const errorData = await response.json().catch(() => ({ detail: response.statusText }));
            throw new Error(errorData.detail || 'API request failed');
        }
        return response.status === 204 ? null : response.json();
    } catch (error) {
        showToast(`❌ Ошибка: ${error.message}`);
        console.error(`API Error at ${endpoint}:`, error);
        throw error;
    }
}

function renderDeals(deals = []) {
    const tbody = document.getElementById('deals-tbody');
    if (!tbody) return;
    tbody.innerHTML = deals.map(d => `
        <tr><td>${d.id}</td><td>${d.client}</td><td>${d.title}</td><td>${d.total}</td><td>${d.stage}</td><td>${new Date(d.created_at).toLocaleDateString()}</td></tr>
    `).join('') || '<tr><td colspan="6">Сделок не найдено</td></tr>';
}

function renderExpenses(expenses = []) {
    const tbody = document.getElementById('expenses-tbody');
    if (!tbody) return;
    tbody.innerHTML = expenses.map(e => `
        <tr><td>${e.id}</td><td>${e.name}</td><td>${e.category}</td><td>${e.amount}</td><td>${new Date(e.date).toLocaleDateString()}</td></tr>
    `).join('') || '<tr><td colspan="5">Расходов не найдено</td></tr>';
}

function renderEquipment(equipment = []) {
    const tbody = document.getElementById('equipment-tbody');
    if (!tbody) return;
    tbody.innerHTML = equipment.map(e => `
        <tr><td>${e.id}</td><td>${e.name}</td><td>${e.model}</td><td>${e.status}</td></tr>
    `).join('') || '<tr><td colspan="4">Техники не найдено</td></tr>';
}

function renderServices(services = []) {
    const tbody = document.getElementById('services-tbody');
    if (!tbody) return;
    tbody.innerHTML = services.map(s => `
        <tr><td>${s.id}</td><td>${s.name}</td><td>${s.category}</td><td>${s.price}</td><td>${s.unit}</td></tr>
    `).join('') || '<tr><td colspan="5">Услуг не найдено</td></tr>';
}

function renderConsumables(consumables = []) {
  const tbody = document.getElementById('consumables-tbody');
  if (!tbody) return;
  tbody.innerHTML = consumables.map(c => `
    <tr>
      <td>${c.name}</td>
      <td>${Number(c.stock_quantity||0).toLocaleString('ru')} ${c.unit||''}</td>
      <td>${(c.price_per_unit||0).toLocaleString('ru')} ₽</td>
      <td>${(c.stock_value||0).toLocaleString('ru')} ₽</td>
      <td>${c.notes||'—'}</td>
    </tr>
  `).join('') || '<tr><td colspan="5" style="text-align:center;color:#ccc;padding:24px;font-size:12px">Расходников пока нет</td></tr>';
}

function renderContactsPage(contacts = []) {
  const tbody = document.getElementById('contacts-tbody');
  if (!tbody) return;
  tbody.innerHTML = contacts.map(c => `
    <tr style="cursor:pointer">
      <td style="color:var(--ink);font-weight:400">${c.name||'—'}</td>
      <td>${c.phone||'—'}</td>
      <td>${c.email||'—'}</td>
      <td></td>
    </tr>
  `).join('') || '<tr><td colspan="4" style="text-align:center;color:#ccc;padding:32px;font-size:12px">Контактов нет</td></tr>';
}

async function loadData() {
    showToast('⏳ Загрузка данных...');
    const endpoints = [
        { key: 'deals', path: '/deals' },
        { key: 'expenses', path: '/expenses' },
        { key: 'equipment', path: '/equipment' },
        { key: 'services', path: '/services' },
        { key: 'stages', path: '/stages' },
        { key: 'consumables', path: '/consumables' },
    ];

    const results = await Promise.allSettled(endpoints.map(e => api(e.path)));
    
    let contacts = [];
    try {
        contacts = JSON.parse(localStorage.getItem('crm_contacts')||'[]');
        if(!Array.isArray(contacts)) contacts=[];
    } catch {}


    let hasErrors = false;
    results.forEach((result, index) => {
        const endpoint = endpoints[index];
        if (result.status === 'fulfilled') {
            let data = result.value;
            console.log(`Успешно загружено ${endpoint.path}:`, data);

            if (endpoint.key === 'deals') {
                renderDeals(data.deals || []);
                const namesFromDeals = [...new Set((data.deals || []).map(d=>(d.client||'').trim()).filter(Boolean))];
                namesFromDeals.forEach(name => {
                    const nn = (name||'').trim();
                    if (!nn) return;
                    if (!contacts.some(c => (c.name||'').toLowerCase().trim() === nn.toLowerCase().trim())) {
                        contacts.push({id:Date.now()+Math.random(),name:nn,phone:'',email:''});
                    }
                });
                localStorage.setItem('crm_contacts', JSON.stringify(contacts));
                renderContactsPage(contacts);

            }
            else if (endpoint.key === 'expenses') renderExpenses(data.expenses || []);
            else if (endpoint.key === 'equipment') renderEquipment(data || []);
            else if (endpoint.key === 'services') renderServices(data || []);
            else if (endpoint.key === 'consumables') renderConsumables(Array.isArray(data) ? data : []);
        } else {
            hasErrors = true;
            console.error(`Не удалось загрузить ${endpoint.path}:`, result.reason);
        }
    });

    showToast(hasErrors ? '⚠️ Часть данных не загрузилась' : '✅ Данные загружены');
}

async function checkAuth() {
  if (!sessionStorage.getItem('token')) {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('access_token');
    if (token) {
        sessionStorage.setItem('token', token);
        window.history.replaceState({}, document.title, '/');
    } else {
        window.location.href = `${API_BASE}/auth/login`;
        return;
    }
  }
  
  try {
    await api('/me');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    await loadData();
  } catch (error) {
    sessionStorage.clear();
    window.location.href = `${API_BASE}/auth/login`;
  }
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 4000);
}

function applyTheme(theme) {
  const t = (theme === 'dark') ? 'dark' : 'light';
  if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  else document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('crm_theme', t);
  const btn = document.getElementById('theme-toggle');
  if (btn) {
    btn.textContent = (t === 'dark') ? '☀' : '🌙';
    btn.title = (t === 'dark') ? 'Светлая тема' : 'Тёмная тема';
  }
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}

function initTheme() {
  const saved = localStorage.getItem('crm_theme');
  applyTheme(saved === 'dark' ? 'dark' : 'light');
}

document.addEventListener('DOMContentLoaded', () => {
    initTheme();
    checkAuth();
});

</script>

</body>
</html>
