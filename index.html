<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        .table-container { max-height: calc(100vh - 250px); overflow-y: auto; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100" x-data="app">

    <!-- Main container -->
    <div x-cloak x-show="isReady" class="flex h-screen">

        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 text-white flex flex-col">
            <div class="p-4 border-b border-gray-700">
                <h1 class="text-2xl font-bold">GCRM <span class="text-sm text-gray-400" x-text="`v${version}`"></span></h1>
                <p class="text-sm text-gray-400" x-text="user.name"></p>
            </div>
            <nav class="flex-1 p-2 space-y-1">
                <template x-for="item in menuItems" :key="item.id">
                    <a href="#" @click.prevent="activeTab = item.id"
                       :class="{'bg-gray-900': activeTab === item.id, 'hover:bg-gray-700': activeTab !== item.id}"
                       class="flex items-center px-4 py-2 rounded-lg transition-colors duration-200">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" :class="item.iconClass" x-html="item.iconPath"></svg>
                        <span x-text="item.name"></span>
                    </a>
                </template>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <div class="flex items-center space-x-2">
                    <select x-model="currentYear" @change="fetchDataForYear" class="bg-gray-700 text-white rounded-md border-gray-600 text-sm w-full">
                        <template x-for="year in years" :key="year">
                            <option :value="year" x-text="year"></option>
                        </template>
                    </select>
                    <button @click="logout()" class="p-2 rounded-md hover:bg-gray-700">
                         <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 p-6">
            <!-- Equipment & Maintenance Tab -->
            <div x-show="activeTab === 'equipment'" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Equipment List -->
                <div>
                    <h2 class="text-2xl font-bold mb-4">Инвентарный список</h2>
                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <div class="p-4 flex justify-between items-center">
                             <input type="text" placeholder="Поиск..." x-model="equipmentSearch" class="w-full p-2 border rounded-md">
                             <button @click="openModal('equipment', {})" class="ml-4 px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 whitespace-nowrap">+ Техника</button>
                        </div>
                        <div class="table-container">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50 sticky top-0">
                                    <tr>
                                        <th @click="sort('equipment', 'name')" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer">Название</th>
                                        <th @click="sort('equipment', 'engine_hours')" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer">Моточасы</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Статус</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    <template x-for="item in filteredEquipment" :key="item.id">
                                        <tr @click="selectEquipment(item)" :class="{'bg-blue-100': selectedEquipment && selectedEquipment.id === item.id}" class="hover:bg-gray-50 cursor-pointer">
                                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" x-text="item.name"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="item.engine_hours"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                <span :class="getStatusClass(item.status)" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full" x-text="item.status"></span>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Maintenance Log -->
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-2xl font-bold">Журнал ТО</h2>
                        <button @click="addMaintenance()" class="px-4 py-2 bg-green-500 text-white rounded-md hover:bg-green-600">+ ТО</button>
                    </div>
                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <div class="p-4">
                             <input type="text" placeholder="Поиск по работам..." x-model="maintenanceSearch" class="w-full p-2 border rounded-md">
                        </div>
                        <div class="table-container">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50 sticky top-0">
                                    <tr>
                                        <th @click="sort('maintenanceLog', 'date')" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer">Дата</th>
                                        <th @click="sort('maintenanceLog', 'equipment_name')" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer">Техника</th>
                                        <th @click="sort('maintenanceLog', 'work_description')" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer">Работы</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Стоимость</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    <template x-for="log in filteredMaintenanceLog" :key="log.id">
                                        <tr @click="openMaintenanceDetails(log)" class="hover:bg-gray-50 cursor-pointer">
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="formatDate(log.date)"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" x-text="log.equipment.name"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="log.work_description"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="formatCurrency(log.cost)"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

             <!-- Other tabs placeholder -->
            <template x-if="activeTab !== 'equipment'">
                <div x-text="`Контент для вкладки '${activeTab}' появится здесь.`" class="text-gray-500"></div>
            </template>
        </main>
    </div>
    
    <!-- Toast Notification -->
    <div x-show="toast.show" x-transition
         class="fixed top-5 right-5 z-50 p-4 rounded-md shadow-lg"
         :class="toast.type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'"
         x-text="toast.message"></div>

</body>
<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('app', () => ({
        version: '11.1',
        isReady: false,
        user: { name: '' },
        activeTab: 'equipment',
        menuItems: [
            { id: 'deals', name: 'Сделки', iconPath: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />' },
            { id: 'tasks', name: 'Задачи', iconPath: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />' },
            { id: 'equipment', name: 'Техника', iconPath: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />' },
            { id: 'consumables', name: 'Расходники', iconPath: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />' },
            { id: 'expenses', name: 'Расходы', iconPath: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 14l6-6m-5.5.5h.01" />' },
            { id: 'reports', name: 'Отчеты', iconPath: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />' },
        ],
        
        years: [],
        currentYear: new Date().getFullYear(),

        // Data stores
        equipment: [],
        maintenanceLog: [],

        // State
        selectedEquipment: null,
        equipmentSearch: '',
        maintenanceSearch: '',
        sortConfig: { equipment: { key: 'name', asc: true }, maintenanceLog: { key: 'date', asc: false } },
        toast: { show: false, message: '', type: 'success' },

        // Computed
        get filteredEquipment() {
            return this.equipment
                .filter(item => item.name.toLowerCase().includes(this.equipmentSearch.toLowerCase()))
                .sort((a, b) => {
                    const dir = this.sortConfig.equipment.asc ? 1 : -1;
                    if (a[this.sortConfig.equipment.key] > b[this.sortConfig.equipment.key]) return 1 * dir;
                    if (a[this.sortConfig.equipment.key] < b[this.sortConfig.equipment.key]) return -1 * dir;
                    return 0;
                });
        },
        
        get filteredMaintenanceLog() {
            return this.maintenanceLog
                .filter(log => log.work_description.toLowerCase().includes(this.maintenanceSearch.toLowerCase()))
                .sort((a, b) => {
                    const dir = this.sortConfig.maintenanceLog.asc ? 1 : -1;
                    if (a[this.sortConfig.maintenanceLog.key] > b[this.sortConfig.maintenanceLog.key]) return 1 * dir;
                    if (a[this.sortConfig.maintenanceLog.key] < b[this.sortConfig.maintenanceLog.key]) return -1 * dir;
                    return 0;
                });
        },

        // Methods
        init() {
            this.api = this.createApiHandler();
            this.api.get('/me').then(user => {
                this.user = user;
                const year = new Date().getFullYear();
                this.currentYear = year;
                return this.fetchYears().then(() => this.fetchDataForYear());
            }).finally(() => {
                this.isReady = true;
            });
        },
        
        fetchDataForYear() {
            const fetches = [
                this.api.get('/equipment').then(data => { this.equipment = data; }),
                this.api.get(`/maintenance?year=${this.currentYear}`).then(data => { this.maintenanceLog = data; })
            ];
            return Promise.all(fetches).catch(err => console.error("Ошибка при загрузке данных:", err));
        },

        fetchYears() {
            return this.api.get('/years').then(data => {
                this.years = data;
                if (!this.years.includes(this.currentYear)) {
                    this.years.unshift(this.currentYear);
                }
            });
        },

        selectEquipment(item) {
            this.selectedEquipment = item;
        },
        
        openMaintenanceDetails(log) {
             // При клике на запись в журнале, подсвечиваем соответствующую технику
            const equipmentItem = this.equipment.find(e => e.id === log.equipment_id);
            if (equipmentItem) {
                this.selectEquipment(equipmentItem);
            }
            // TODO: Open modal with full details
            this.showToast(`Выбрана запись ТО #${log.id} для ${log.equipment.name}`, 'success');
        },
        
        addMaintenance() {
            if (!this.selectedEquipment) {
                 this.showToast("💡 Сначала выберите технику в левой таблице.", 'error');
                return;
            }
            // TODO: Open modal to add maintenance for this.selectedEquipment
            this.showToast(`Добавление ТО для: ${this.selectedEquipment.name}`);
        },

        logout() { window.location.href = '/api/auth/logout'; },

        getStatusClass(status) {
            switch(status) {
                case 'active': return 'bg-green-100 text-green-800';
                case 'in_repair': return 'bg-yellow-100 text-yellow-800';
                case 'written_off': return 'bg-red-100 text-red-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        },

        sort(table, key) {
            if (this.sortConfig[table].key === key) {
                this.sortConfig[table].asc = !this.sortConfig[table].asc;
            } else {
                this.sortConfig[table].key = key;
                this.sortConfig[table].asc = true;
            }
        },
        
        formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('ru-RU');
        },

        formatCurrency(amount) {
            if (typeof amount !== 'number') return '-';
            return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB' }).format(amount);
        },
        
        showToast(message, type = 'success') {
            this.toast.message = message;
            this.toast.type = type;
            this.toast.show = true;
            setTimeout(() => this.toast.show = false, 3000);
        },
        
        createApiHandler() {
            const handleResponse = async (response) => {
                if (response.status === 401) {
                    this.logout();
                    throw new Error("Unauthorized");
                }
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ detail: response.statusText }));
                    throw new Error(errorData.detail || "Server Error");
                }
                return response.json();
            };

            return {
                get: (url) => fetch(`/api${url}`).then(handleResponse),
                post: (url, data) => fetch(`/api${url}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).then(handleResponse),
                 patch: (url, data) => fetch(`/api${url}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).then(handleResponse),
                 delete: (url) => fetch(`/api${url}`, { method: 'DELETE' }).then(handleResponse),
            };
        }
    }))
})
</script>
</html>
